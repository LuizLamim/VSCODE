  <style>
    /* ============================================
   ADMINISTRADOR JUDICIAL IA - LANDING PAGE
   CSS COMPLETO - ETAPA 5 FINAL
   Design Tech/AI Innovation
   ============================================ */

/* ========================================
   1. VARIÁVEIS CSS (Design Tokens Tech)
   ======================================== */
:root {
  /* CORES PRIMÁRIAS TECH */
  --color-primary: #0f172a;           /* Azul Tech Profundo */
  --color-secondary: #7c3aed;         /* Roxo IA */
  --color-accent: #06b6d4;            /* Ciano Neon */
  --color-accent-hover: #0891b2;      /* Ciano Mais Escuro */
  
  /* CORES NEUTRAS */
  --color-white: #f8fafc;             /* Branco Tech */
  --color-dark: #1e293b;              /* Cinza Espacial */
  --color-gray-light: #e2e8f0;        /* Cinza Claro */
  --color-gray-medium: #64748b;       /* Cinza Médio */
  --color-gray-lighter: #f1f5f9;      /* Cinza Muito Claro */
  
  /* CORES DE SUPORTE */
  --color-success: #10b981;           /* Verde Sucesso */
  --color-warning: #f59e0b;           /* Laranja Alerta */
  --color-danger: #ef4444;            /* Vermelho */
  --color-info: #3b82f6;              /* Azul Informação */
  
  /* GRADIENTES TECH */
  --gradient-hero: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
  --gradient-pricing: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
  --gradient-final-cta: linear-gradient(90deg, #0f172a 0%, #7c3aed 50%, #06b6d4 100%);
  --gradient-text: linear-gradient(135deg, #06b6d4 0%, #7c3aed 100%);
  --gradient-text-light: linear-gradient(135deg, #ffffff 0%, #06b6d4 100%);
  --gradient-button: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
  
  /* SOMBRAS */
  --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
  --shadow-xl: 0 12px 48px rgba(0, 0, 0, 0.16);
  --shadow-neon: 0 0 20px rgba(6, 182, 212, 0.5);
  --shadow-neon-hover: 0 0 30px rgba(6, 182, 212, 0.8), 0 8px 24px rgba(6, 182, 212, 0.3);
  --shadow-glow-purple: 0 8px 32px rgba(124, 58, 237, 0.3);
  
  /* BORDER RADIUS */
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --radius-2xl: 20px;
  --radius-full: 24px;
  
  /* ESPAÇAMENTOS */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
  --spacing-2xl: 48px;
  --spacing-3xl: 64px;
  --spacing-4xl: 80px;
  --spacing-5xl: 100px;
  
  /* TIPOGRAFIA */
  --font-heading: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  
  /* TRANSIÇÕES */
  --transition-fast: 0.2s ease;
  --transition-base: 0.3s ease;
  --transition-slow: 0.5s ease;
}

/* ========================================
   2. RESET/BASE
   ======================================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font-body);
  font-size: 17px;
  line-height: 1.7;
  color: var(--color-dark);
  background-color: #ffffff;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

img {
  max-width: 100%;
  height: auto;
  display: block;
}

ul {
  list-style: none;
}

a {
  text-decoration: none;
  color: inherit;
}

button {
  border: none;
  background: none;
  cursor: pointer;
  font-family: inherit;
}

/* ========================================
   3. TIPOGRAFIA GLOBAL
   ======================================== */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-heading);
  font-weight: 700;
  line-height: 1.2;
  color: var(--color-primary);
  margin-bottom: var(--spacing-lg);
  letter-spacing: -0.02em;
}

h1 {
  font-size: 72px;
  font-weight: 800;
}

h2 {
  font-size: 56px;
}

h3 {
  font-size: 40px;
  font-weight: 600;
}

h4 {
  font-size: 24px;
  font-weight: 600;
}

p {
  margin-bottom: var(--spacing-md);
  line-height: 1.7;
}

strong {
  font-weight: 600;
  color: var(--color-primary);
}

/* Text Gradient Effect */
.text-gradient {
  background: var(--gradient-text);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.text-gradient-light {
  background: var(--gradient-text-light);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ========================================
   4. LAYOUT GLOBAL
   ======================================== */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 var(--spacing-2xl);
}

section {
  padding: var(--spacing-5xl) 0;
  position: relative;
}

/* Section Titles */
.section__title {
  font-size: 56px;
  font-weight: 700;
  color: var(--color-primary);
  text-align: center;
  margin-bottom: var(--spacing-lg);
}

.section__title--light {
  color: var(--color-white);
}

.section__subtitle {
  font-size: 20px;
  color: var(--color-gray-medium);
  text-align: center;
  margin-bottom: var(--spacing-3xl);
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

.section__subtitle--light {
  color: rgba(255, 255, 255, 0.85);
}

/* ========================================
   5. COMPONENTES REUTILIZÁVEIS
   ======================================== */

/* ----- BOTÕES ----- */
.btn {
  display: inline-block;
  font-family: var(--font-heading);
  font-size: 18px;
  font-weight: 600;
  padding: 18px 56px;
  border-radius: var(--radius-lg);
  text-align: center;
  cursor: pointer;
  transition: all var(--transition-base);
  border: none;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
}

.btn--primary {
  background: var(--gradient-button);
  color: #ffffff;
}

.btn--neon {
  box-shadow: var(--shadow-neon);
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
}

.btn--neon:hover {
  box-shadow: var(--shadow-neon-hover);
  transform: translateY(-2px) scale(1.02);
}

.btn--neon:active {
  transform: translateY(0) scale(1);
  box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
}

.btn--large {
  padding: 20px 64px;
  font-size: 18px;
}

.btn--cta-final {
  padding: 24px 72px;
  font-size: 20px;
  box-shadow: 0 8px 30px rgba(6, 182, 212, 0.4);
}

.btn--full-width {
  width: 100%;
  display: block;
}

/* Button Pulse Animation */
.btn--pulse {
  animation: pulse-button 2s infinite;
}

@keyframes pulse-button {
  0%, 100% {
    box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
  }
  50% {
    box-shadow: 0 0 40px rgba(6, 182, 212, 0.8), 0 8px 30px rgba(6, 182, 212, 0.4);
  }
}

/* ----- BADGES ----- */
.badge {
  display: inline-block;
  padding: 8px 16px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-family: var(--font-mono);
}

.badge--ai {
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  color: #ffffff;
}

.badge--trained {
  background: rgba(124, 58, 237, 0.1);
  border: 2px solid #7c3aed;
  color: #7c3aed;
}

.badge--discount {
  background: var(--color-success);
  color: #ffffff;
  animation: pulse-badge 2s infinite;
}

.badge--highlight {
  background: var(--color-accent);
  color: #ffffff;
  box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
}

.badge--premium {
  background: var(--color-secondary);
  color: #ffffff;
  margin: 0 var(--spacing-sm);
}

.badge--result {
  background: var(--color-success);
  color: #ffffff;
}

.badge--profile {
  background: var(--color-info);
  color: #ffffff;
}

.badge--small {
  padding: 4px 12px;
  font-size: 11px;
}

.badge--success {
  background: rgba(16, 185, 129, 0.1);
  color: var(--color-success);
  border: 1px solid var(--color-success);
}

.badge--time {
  background: rgba(6, 182, 212, 0.1);
  color: var(--color-accent);
}

.badge--source {
  background: rgba(124, 58, 237, 0.1);
  color: var(--color-secondary);
}

.badge--map {
  background: rgba(245, 158, 11, 0.1);
  color: var(--color-warning);
}

.badge--urgent {
  background: var(--color-warning);
  color: #ffffff;
  animation: pulse-urgent 1.5s infinite;
}

.badge--large {
  padding: 12px 24px;
  font-size: 16px;
}

.badge--best-offer {
  background: linear-gradient(135deg, #f59e0b, #fbbf24);
  color: #ffffff;
  font-size: 14px;
  padding: 10px 20px;
}

.badge--glow {
  background: var(--color-accent);
  color: #ffffff;
  box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
}

.badge--feature {
  background: var(--color-warning);
  color: #ffffff;
}

@keyframes pulse-badge {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.75;
  }
}

@keyframes pulse-urgent {
  0%, 100% {
    transform: scale(1);
    box-shadow: 0 0 0 rgba(245, 158, 11, 0);
  }
  50% {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(245, 158, 11, 0.5);
  }
}

/* ========================================
   6. SEÇÕES ESPECÍFICAS
   ======================================== */

/* ----- HERO SECTION (Tech Dark) ----- */
.hero--tech {
  background: var(--gradient-hero);
  min-height: 100vh;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
  padding: var(--spacing-5xl) 0;
}

.hero__particles {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
  background-size: 30px 30px;
  opacity: 0.3;
  animation: particles-float 20s linear infinite;
}

@keyframes particles-float {
  0% {
    transform: translateY(0);
  }
  100% {
    transform: translateY(-30px);
  }
}

.hero .container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--spacing-3xl);
  align-items: center;
  position: relative;
  z-index: 2;
}

.hero__content {
  color: #ffffff;
}

.hero__badge-wrapper {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-md);
  margin-bottom: var(--spacing-xl);
}

.hero__title--tech {
  font-size: 72px;
  font-weight: 800;
  color: #ffffff;
  line-height: 1.1;
  margin-bottom: var(--spacing-lg);
}

.hero__subtitle--tech {
  font-size: 22px;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: var(--spacing-xl);
  line-height: 1.6;
}

.hero__benefits {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-lg);
  margin-bottom: var(--spacing-xl);
}

.benefit-item {
  display: flex;
  align-items: center;
  gap: var(--spacing-sm);
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  padding: var(--spacing-md) var(--spacing-lg);
  border-radius: var(--radius-full);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.benefit-icon {
  font-size: 24px;
}

.benefit-text {
  color: rgba(255, 255, 255, 0.95);
  font-size: 15px;
}

.hero__trust {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-md);
  margin-top: var(--spacing-lg);
}

.trust-item {
  color: rgba(255, 255, 255, 0.85);
  font-size: 14px;
}

.hero__promo {
  margin-top: var(--spacing-lg);
}

/* Chat Mockup */
.hero__visual {
  position: relative;
}

.chat-mockup {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: var(--radius-2xl);
  box-shadow: var(--shadow-xl);
  overflow: hidden;
}

.chat-mockup__header {
  background: rgba(255, 255, 255, 0.1);
  padding: var(--spacing-md) var(--spacing-lg);
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.chat-header__info {
  display: flex;
  align-items: center;
  gap: var(--spacing-md);
}

.chat-header__avatar {
  width: 48px;
  height: 48px;
  background: var(--gradient-button);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.chat-header__name {
  color: #ffffff;
  font-weight: 600;
  font-size: 16px;
  margin-bottom: 2px;
}

.chat-header__status {
  color: rgba(255, 255, 255, 0.7);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--color-success);
  border-radius: 50%;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.5;
  }
}

.chat-mockup__body {
  padding: var(--spacing-lg);
  min-height: 300px;
}

.chat-message {
  margin-bottom: var(--spacing-lg);
}

.chat-message--user {
  display: flex;
  justify-content: flex-end;
}

.chat-message--ai {
  display: flex;
  justify-content: flex-start;
}

.chat-message__bubble {
  max-width: 80%;
  padding: var(--spacing-md) var(--spacing-lg);
  border-radius: var(--radius-lg);
  font-size: 15px;
  line-height: 1.5;
}

.chat-message__bubble--user {
  background: var(--color-accent);
  color: #ffffff;
  border-bottom-right-radius: 4px;
}

.chat-message__bubble--ai {
  background: rgba(255, 255, 255, 0.95);
  color: var(--color-dark);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow-md);
}

.chat-message__bubble--ai p {
  margin-bottom: var(--spacing-sm);
}

.ai-response__badge {
  margin-top: var(--spacing-sm);
}

/* Typing Indicator */
.typing-indicator {
  display: flex;
  gap: 6px;
  padding: var(--spacing-md) var(--spacing-lg);
  background: rgba(255, 255, 255, 0.95);
  border-radius: var(--radius-lg);
  width: fit-content;
}

.typing-indicator span {
  width: 8px;
  height: 8px;
  background: var(--color-accent);
  border-radius: 50%;
  animation: typing-bounce 1.2s infinite;
}

.typing-indicator span:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-indicator span:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes typing-bounce {
  0%, 60%, 100% {
    transform: translateY(0);
  }
  30% {
    transform: translateY(-10px);
  }
}

.chat-mockup__footer {
  background: rgba(255, 255, 255, 0.1);
  padding: var(--spacing-md) var(--spacing-lg);
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.chat-input {
  width: 100%;
  padding: var(--spacing-md);
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: var(--radius-md);
  color: rgba(255, 255, 255, 0.7);
  font-size: 14px;
}

.mockup__badge {
  position: absolute;
  bottom: -20px;
  right: 20px;
}

/* ----- PROBLEM SECTION ----- */
.problem--tech {
  background: #ffffff;
  padding: var(--spacing-5xl) 0;
}

.problem__grid--four {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--spacing-xl);
  margin-top: var(--spacing-3xl);
}

.problem__card--glass {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(0, 0, 0, 0.05);
  border-radius: var(--radius-xl);
  padding: var(--spacing-xl);
  box-shadow: var(--shadow-md);
  transition: all var(--transition-base);
}

.problem__card--glass:hover {
  box-shadow: var(--shadow-lg);
  transform: translateY(-8px);
  border-color: rgba(124, 58, 237, 0.2);
}

.problem__icon--tech {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, rgba(6, 182, 212, 0.1), rgba(124, 58, 237, 0.1));
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: var(--spacing-lg);
}

.problem__title {
  font-size: 22px;
  font-weight: 600;
  color: var(--color-primary);
  margin-bottom: var(--spacing-md);
}

.problem__text {
  color: var(--color-gray-medium);
  line-height: 1.7;
  margin-bottom: var(--spacing-md);
  font-size: 16px;
}

.problem__highlight {
  background: rgba(6, 182, 212, 0.1);
  border-left: 4px solid var(--color-accent);
  padding: var(--spacing-md);
  border-radius: var(--radius-md);
  color: var(--color-dark);
  font-size: 15px;
  margin-top: var(--spacing-md);
}

.problem__consequences {
  margin-top: var(--spacing-5xl);
  background: linear-gradient(135deg, rgba(239, 68, 68, 0.05), rgba(239, 68, 68, 0.02));
  border-radius: var(--radius-xl);
  padding: var(--spacing-3xl);
  border-left: 4px solid var(--color-danger);
}

.consequences__title {
  font-size: 32px;
  color: var(--color-danger);
  text-align: center;
  margin-bottom: var(--spacing-lg);
}

.consequences__list {
  max-width: 900px;
  margin: 0 auto;
}

.consequences__list li {
  font-size: 18px;
  color: var(--color-dark);
  margin-bottom: var(--spacing-md);
  padding-left: var(--spacing-md);
}

.consequences__callout {
  font-size: 20px;
  font-weight: 600;
  color: var(--color-danger);
  text-align: center;
  margin-top: var(--spacing-lg);
}

/* ----- SOLUTION SECTION ----- */
.solution--tech {
  background: linear-gradient(135deg, var(--color-white) 0%, var(--color-gray-lighter) 100%);
  padding: var(--spacing-5xl) 0;
}

.solution__grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: var(--spacing-3xl);
  align-items: start;
  margin-top: var(--spacing-3xl);
}

.solution__intro-title {
  font-size: 32px;
  color: var(--color-primary);
  margin-bottom: var(--spacing-lg);
}

.solution__text {
  color: var(--color-dark);
  font-size: 17px;
  line-height: 1.7;
  margin-bottom: var(--spacing-lg);
}

.solution__list {
  margin-left: var(--spacing-xl);
  margin-bottom: var(--spacing-lg);
}

.solution__list li {
  list-style: none;
  color: var(--color-dark);
  margin-bottom: var(--spacing-sm);
  font-size: 16px;
}

.solution__badge-group {
  display: flex;
  flex-wrap: wrap;
  gap: var(--spacing-md);
  margin: var(--spacing-lg) 0;
}

.solution__mechanism-title {
  font-size: 28px;
  color: var(--color-secondary);
  margin: var(--spacing-xl) 0 var(--spacing-lg);
}

.solution__features-list {
  display: flex;
  flex-direction: column;
  gap: var(--spacing-md);
  margin: var(--spacing-lg) 0;
}

.feature-item-inline {
  display: flex;
  gap: var(--spacing-md);
  align-items: start;
  background: rgba(124, 58, 237, 0.05);
  padding: var(--spacing-md);
  border-radius: var(--radius-md);
  border-left: 3px solid var(--color-secondary);
}

.feature-icon {
  font-size: 24px;
  flex-shrink: 0;
}

.feature-text {
  color: var(--color-dark);
  font-size: 15px;
  line-height: 1.6;
}

.solution__callout {
  background: rgba(6, 182, 212, 0.1);
  border-left: 4px solid var(--color-accent);
  padding: var(--spacing-lg);
  border-radius: var(--radius-md);
  margin-top: var(--spacing-xl);
  font-size: 17px;

   7. RESPONSIVIDADE (Media Queries)

/* ----- TABLET (768px - 1024px) ----- */
@media (max-width: 1024px) {
  h1 {
    font-size: 56px;
  }
  
  h2, .section__title {
    font-size: 40px;
  }
  
  h3 {
    font-size: 32px;
  }
  
  .container {
    padding: 0 var(--spacing-xl);
  }
  
  section {
    padding: var(--spacing-4xl) 0;
  }
  
  /* Hero */
  .hero .container {
    grid-template-columns: 1fr;
    gap: var(--spacing-xl);
  }
  
  .hero__title--tech {
    font-size: 56px;
  }
  
  .hero__visual {
    order: -1;
  }
  
  /* Problem */
  .problem__grid--four {
    grid-template-columns: 1fr;
  }
  
  /* Solution */
  .solution__grid {
    grid-template-columns: 1fr;
  }
  
  /* Features */
  .features__grid {
    grid-template-columns: 1fr;
  }
  
  /* Comparison Table */
  .comparison__table {
    font-size: 14px;
  }
  
  /* Testimonials */
  .testimonials__grid--two {
    grid-template-columns: 1fr;
  }
  
  /* Authority */
  .authority__grid {
    grid-template-columns: 1fr;
  }
  
  /* Pricing Justification */
  .justification__grid {
    grid-template-columns: 1fr;
  }
  
  /* Guarantee */
  .guarantee__content {
    grid-template-columns: 1fr;
    text-align: center;
  }
  
  /* Trust Grid */
  .trust-grid--four {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* ----- MOBILE (&lt;768px) ----- */
@media (max-width: 767px) {
  html {
    font-size: 14px;
  }
  
  h1 {
    font-size: 40px;
  }
  
  h2, .section__title {
    font-size: 32px;
  }
  
  h3 {
    font-size: 24px;
  }
  
  .container {
    padding: 0 var(--spacing-lg);
  }
  
  section {

  }
  
  /* Buttons */
  .btn {
    font-size: 16px;
    padding: 16px 32px;

  /* Hero */

    min-height: auto;

  }
  
  .hero__title--tech {
    font-size: 36px;
  }
  
  .hero__subtitle--tech {
    font-size: 18px;
  }
  
  .hero__benefits {
    flex-direction: column;
  }
  
  .benefit-item {

  }
  
  /* Chat Mockup */
  .chat-mockup__body {
    min-height: 250px;
  }
  
  .chat-message__bubble {
    max-width: 90%;
  }
  
  /* Comparison Table */

  .comparison__header,

    padding: var(--spacing-sm) var(--spacing-md);

  /* Pricing */
  .pricing-card--premium {

  .pricing-card__title {

  }

/* ========================================
   8. ANIMAÇÕES ADICIONAIS
   ======================================== */

/* Fade in ao scroll */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.fade-in {
  animation: fadeInUp 0.8s ease forwards;
}

/* Smooth transitions */
* {
  transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform;
  transition-duration: var(--transition-base);
  transition-timing-function: ease;
}
